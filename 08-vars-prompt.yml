---
- name: variable from prompt
  hosts: local
  connection: local
  vars_prompt:
  - name: USERNAME
    prompt: Please enter username 
    private: true

  - name: PASSWORD
    prompt: Please enter password 
    private: true

  tasks:
  - name: print username
    ansible.builtin.debug:
      msg: "hello username is : {{ USERNAME }} and password is : {{ PASSWORD }}"    

  tasks: 
  - name: print without o/p
    ansible.builtin.debug:
      msg: "hello username is {{ USERNAME }} and password is : {{ PASSWORD }}"
    no_log: true  
---
- name: vars preference
  hosts: local
  connection: local
  vars:
   GREETING: HELLO FROM PLAY

  vars_file:
  - course.yml

  vars_prompt:
   - name: GREETING
     prompt: please enter your prompt 
     private: false

  tasks:
  - name: print the greeting 
    vars:
     GREETING: "HELLO FROM TASKS"
    ansible.builtin.debug:
      msg: "hello Course is : {{ COURSE }} , duration : {{ DURATION }}, trainer is: {{ TRAINER }}"